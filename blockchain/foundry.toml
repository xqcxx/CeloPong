[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.20"
optimizer = true
optimizer_runs = 200

remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/"
]

# RPC endpoints
[rpc_endpoints]
celo_sepolia = "${CELO_SEPOLIA}"
celo_sepolia_alchemy = "https://celo-sepolia.g.alchemy.com/v2/oA3aWf4dW3KozyXiBJ5TiZHnXtykfedo"
celo = "${CELO_MAINNET}"
celo_forno = "https://forno.celo.org"

# Celoscan verification (etherscan-compatible API)
[etherscan]
celo = { key = "${CELOSCAN_API_KEY}", url = "https://api.celoscan.io/api" }
celo_sepolia = { key = "${CELOSCAN_API_KEY}", url = "https://api-sepolia.celoscan.io/api" }
